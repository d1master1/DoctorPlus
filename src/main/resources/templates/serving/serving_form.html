<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${servingDTO.id} ? 'Редактировать услугу' : 'Добавить новую услугу'">Форма</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" />
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4" th:text="${servingDTO.id} ? 'Редактировать услугу' : 'Добавить новую услугу'">Форма</h2>

    <form th:action="@{/serving/save}" method="post" th:object="${servingDTO}">
        <input type="hidden" th:field="*{id}" />

        <!-- Название -->
        <div class="mb-3">
            <label for="name" class="form-label">Название:</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" required />
            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
        </div>

        <!-- Описание -->
        <div class="mb-3">
            <label for="description" class="form-label">Описание:</label>
            <textarea id="description" th:field="*{description}" class="form-control"></textarea>
        </div>

        <!-- Стоимость -->
        <div class="mb-3">
            <label for="cost" class="form-label">Стоимость:</label>
            <input type="number" step="0.01" id="cost" th:field="*{cost}" class="form-control" required />
            <div th:if="${#fields.hasErrors('cost')}" th:errors="*{cost}" class="text-danger"></div>
        </div>

        <!-- Пациент -->
        <div class="mb-3">
            <label for="patientId" class="form-label">Пациент (опционально):</label>
            <select id="patientId" th:field="*{patientId}" class="form-select">
                <option value="">Не назначен</option>
                <option th:each="p : ${patients}"
                        th:value="${p.id}"
                        th:text="${p.name + ' ' + p.surname}">Пациент</option>
            </select>
        </div>

        <!-- Пользователь -->
        <div class="mb-3">
            <label for="userId" class="form-label">Пользователь:</label>
            <select id="userId" th:field="*{userId}" class="form-select" required>
                <option th:each="u : ${users}"
                        th:value="${u.id}"
                        th:text="${u.username}">Пользователь</option>
            </select>
            <div th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" class="text-danger"></div>
        </div>

        <!-- Кнопки -->
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a th:href="@{/serving/list}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
