<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${servingDTO.id} ? 'Редактировать услугу' : 'Добавить услугу'">Форма</title>
</head>
<body>

<h2 th:text="${servingDTO.id} ? 'Редактировать услугу' : 'Добавить новую услугу'">Форма</h2>

<form th:action="@{/serving/save}" method="post" th:object="${servingDTO}">
    <input type="hidden" th:field="*{id}" />

    <!-- Имя -->
    <div class="mb-3">
        <label>Название:</label>
        <input type="text" th:field="*{name}" required />
        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>

    <!-- Описание -->
    <div class="mb-3">
        <label>Описание:</label>
        <textarea th:field="*{description}"></textarea>
        <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
    </div>

    <!-- Стоимость -->
    <div class="mb-3">
        <label>Стоимость:</label>
        <input type="number" step="0.01" th:field="*{cost}" required />
        <div th:if="${#fields.hasErrors('cost')}" th:errors="*{cost}"></div>
    </div>

    <!-- Пациент (опционально) -->
    <div class="mb-3">
        <label>Пациент:</label>
        <select th:field="*{patientId}">
            <option value="">Не назначен</option>
            <option th:each="p : ${patients}"
                    th:value="${p.id}"
                    th:text="${p.name + ' ' + p.surname}">Пациент</option>
        </select>
    </div>

    <!-- Пользователь -->
    <div class="mb-3">
        <label>Пользователь:</label>
        <select th:field="*{userId}" required>
            <option th:each="u : ${users}"
                    th:value="${u.id}"
                    th:text="${u.username}">Пользователь</option>
        </select>
        <div th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></div>
    </div>

    <!-- Кнопки -->
    <button type="submit">Сохранить</button>
    <a th:href="@{/serving/list}">Отмена</a>
</form>

</body>
</html>
