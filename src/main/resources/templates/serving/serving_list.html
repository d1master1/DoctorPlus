<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Услуги</title>
</head>
<body>

<h2>Список услуг</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Название</th>
        <th>Описание</th>
        <th>Стоимость</th>
        <th>Пациент</th>
        <th>Пользователь</th>
        <th>Действия</th>
    </tr>
    <tr th:each="serving : ${servings}">
        <td th:text="${serving.id}">ID</td>
        <td th:text="${serving.name}">Название</td>
        <td th:text="${serving.description}">Описание</td>
        <td th:text="${serving.cost}">Стоимость</td>
        <td th:text="${serving.patient?.name + ' ' + serving.patient?.surname}">Пациент</td>
        <td th:text="${serving.user?.username}">Пользователь</td>
        <td>
            <a th:href="@{/serving/edit/{id}(id=${serving.id})}">Редактировать</a> |
            <a th:href="@{/serving/delete/{id}(id=${serving.id})}">Удалить</a>
        </td>
    </tr>
</table>

<a href="/serving/form">Добавить услугу</a>

</body>
</html>
