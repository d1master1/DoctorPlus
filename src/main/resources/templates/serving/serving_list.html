<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>DoctorPlus — Услуги</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .sidebar {
            width: 180px;
            background-color: #f8f9fa;
            border-right: 1px solid #ddd;
            height: 100vh;
            position: fixed;
            padding-top: 1rem;
        }

        .sidebar .nav-link {
            margin: 0.3rem 0;
        }

        .header {
            height: 56px;
            padding: 0 1rem;
            background-color: #e9ecef;
            border-bottom: 1px solid #ddd;
            margin-left: 180px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .content {
            margin-left: 180px;
            margin-top: 56px;
            padding: 1rem;
        }

        .btn-edit {
            background-color: #fff176;
            border-color: #fff176;
            color: #000;
        }

        .btn-edit:hover {
            background-color: #f9f871;
            border-color: #f9f871;
        }

        .btn-delete {
            background-color: #f44336;
            border-color: #f44336;
            color: #fff;
        }

        .btn-delete:hover {
            background-color: #d32f2f;
            border-color: #d32f2f;
        }

        table thead th {
            text-align: center;
            vertical-align: middle;
        }

        table tbody td {
            vertical-align: middle;
        }

        .delete-confirmation {
            font-size: 0.9rem;
            color: #b71c1c;
            user-select: none;
        }
    </style>
</head>
<body>

<!-- Боковое меню -->
<div th:replace="~{/include/sidebar :: sidebar}"></div>

<header class="header">
    <div>DoctorPlus — Услуги</div>
    <div class="d-flex gap-2 align-items-center">
        <!-- Кнопки "Добавить" и "Удалить всех" -->
        <div sec:authorize="hasAnyRole('DOCTOR','ADMIN')" class="d-flex align-items-center gap-2">
            <a th:href="@{/serving/add}" class="btn btn-primary">Добавить</a>
            <form th:action="@{/serving/deleteAll}" method="post" style="display: inline;"
                  onsubmit="return confirm('Удалить все услуги?');">
                <button type="submit" class="btn btn-danger">Удалить все</button>
            </form>
        </div>
    </div>
</header>

<main class="content">
    <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
        Невозможно удалить услугу — она связана с приемом.
    </div>
    <div th:if="${param.partialError}" class="alert alert-warning text-center" role="alert">
        Удалены только неиспользуемые записи.
    </div>

    <table class="table table-bordered table-hover table-striped align-middle text-center">
        <thead class="table-light">
        <tr>
            <th>Название</th>
            <th>Описание</th>
            <th>Стоимость</th>
            <th>Пациент</th>
            <th>Дата создания</th>
            <th sec:authorize="hasAnyRole('DOCTOR','ADMIN')">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="serving : ${servings}">
            <td th:text="${serving.name}">Название</td>
            <td th:text="${serving.description}">Описание</td>
            <td th:text="${serving.formattedCost}">Стоимость</td>
            <td th:text="${serving.patient != null ? serving.patient.fullName : '—'}">Пациент</td>
            <td th:text="${serving.createdAt.format(java.time.format.DateTimeFormatter.ofPattern('dd.MM.yyyy'))}">Дата создания</td>
            <td sec:authorize="hasAnyRole('DOCTOR','ADMIN')">
                <a th:href="@{/serving/edit/{id}(id=${serving.id})}" class="btn btn-edit btn-sm me-1">Изменить</a>
                <form th:id="'deleteForm_' + ${serving.id}"
                      th:action="@{/serving/delete/{id}(id=${serving.id})"
                      method="post" style="display: inline-block;"
                      onsubmit="return confirm('Удалить услугу?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-delete btn-sm">Удалить</button>
                </form>
                <div th:id="'deleteConfirm_' + ${serving.id}" class="delete-confirmation" style="display:none; margin-top: 0.3rem;">
                    <span>Удалить услугу?</span>
                    <button type="button" class="btn btn-sm btn-danger ms-2" th:attr="onclick=|submitDeleteForm(${serving.id})|">Подтвердить</button>
                    <button type="button" class="btn btn-sm btn-secondary ms-1" th:attr="onclick=|hideDeleteConfirm(${serving.id})|">Отмена</button>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(servings)}">
            <td colspan="6" class="text-center text-muted">Услуги отсутствуют</td>
        </tr>
        </tbody>
    </table>
</main>

<script>
    function submitDeleteForm(id) {
        document.getElementById('deleteForm_' + id).submit();
    }

    function hideDeleteConfirm(id) {
        document.getElementById('deleteConfirm_' + id).style.display = 'none';
    }
</script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

</body>
</html>
