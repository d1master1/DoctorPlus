<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DoctorPlus — Форма для пациента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{/include/header}"></div>
<main class="flex-grow-1">
    <div class="container mt-5">
        <h1 th:text="${#strings.isEmpty(patient.id)} ? 'Добавить пациента' : 'Редактировать пациента'"></h1>
        <form th:action="@{/patient/save}" th:object="${patient}" method="post" novalidate>
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label for="surname" class="form-label">Фамилия</label>
                <input type="text" class="form-control" id="surname" th:field="*{surname}" required />
            </div>

            <div class="mb-3">
                <label for="name" class="form-label">Имя</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" required />
            </div>

            <div class="mb-3">
                <label for="patronymic" class="form-label">Отчество (необязательно)</label>
                <input type="text" class="form-control" id="patronymic" th:field="*{patronymic}" />
            </div>

            <div class="mb-3">
                <label for="passport" class="form-label">Паспорт</label>
                <input type="text" class="form-control" id="passport" th:field="*{passport}" required pattern="\d{10}"
                       title="Введите 10 цифр паспорта" />
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Телефон</label>
                <input type="tel" class="form-control" id="phone" th:field="*{phone}" required
                       pattern="^\+?[0-9\s\-]{7,15}$" title="Введите корректный номер телефона" />
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" th:field="*{email}" />
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Адрес</label>
                <input type="text" class="form-control" id="address" th:field="*{address}" />
            </div>

            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="@{/patient}" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
