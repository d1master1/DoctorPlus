<!-- sidebar.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- Боковое меню -->
<div th:fragment="sidebar" class="sidebar d-flex flex-column bg-light vh-100 p-3">
    <!-- Логотип/название клиники -->
    <div class="px-3 mb-3 d-flex align-items-center border-bottom py-2">
        <i class="bi bi-heart-pulse me-2 fs-5"></i>
        <span class="fs-5 fw-semibold">DoctorPlus</span>
    </div>

    <!-- Навигация -->
    <nav class="nav flex-column px-3">
        <!-- Главная -->
        <a class="btn btn-outline-secondary mb-2 text-start" th:href="@{/}">
            <i class="bi bi-house-door me-2"></i>Главная
        </a>

        <!-- Профиль -->
        <a class="btn btn-outline-secondary mb-2 text-start" th:href="@{/profile}" sec:authorize="isAuthenticated()">
            <i class="bi bi-person-circle me-2"></i>Профиль
        </a>

        <!-- Услуги -->
        <a class="btn btn-outline-secondary mb-2 text-start" th:href="@{/serving}"
           sec:authorize="isAuthenticated()">
            <i class="bi bi-capsules me-2"></i>Услуги
        </a>

        <!-- Приёмы -->
        <a class="btn btn-outline-secondary mb-2 text-start" th:href="@{/appointment}"
           sec:authorize="isAuthenticated()">
            <i class="bi bi-calendar-check me-2"></i>Приёмы
        </a>

        <!-- Пациенты -->
        <a class="btn btn-outline-secondary mb-2 text-start" th:href="@{/patient}"
           sec:authorize="hasAnyRole('DOCTOR', 'ADMIN')">
            <i class="bi bi-people me-2"></i>Пациенты
        </a>

        <!-- Доктора -->
        <a class="btn btn-outline-secondary mb-2 text-start" th:href="@{/doctor}"
           sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-video3 me-2"></i>Доктора
        </a>

        <!-- Пользователи -->
        <a class="btn btn-outline-secondary mb-2 text-start" th:href="@{/user}"
           sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-lines-fill me-2"></i>Пользователи
        </a>

        <!-- О системе -->
        <a class="btn btn-outline-secondary mb-2 text-start" th:href="@{/about}">
            <i class="bi bi-info-circle me-2"></i>О системе
        </a>

        <!-- Выход -->
        <a href="#" class="btn btn-outline-danger text-start mt-auto"
           onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
            <i class="bi bi-box-arrow-right me-2"></i>Выход
        </a>
        <form id="logout-form" th:action="@{/logout}" method="post" style="display:none;">
            <input type="hidden" name="_csrf" th:value="${_csrf?.token}" />
        </form>
    </nav>
</div>

</body>
</html>
