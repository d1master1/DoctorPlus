<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
        .auth-box {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 0 1rem rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<div class="auth-box">
    <h2 class="text-center mb-4">Регистрация</h2>

    <!-- Форма -->
    <form th:action="@{/register}" method="post" th:object="${userDTO}" novalidate>

        <!-- Логин -->
        <div class="mb-3">
            <label for="username" class="form-label">Логин</label>
            <input type="text" id="username" th:field="*{username}" class="form-control" required />
            <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></div>
        </div>

        <!-- Имя -->
        <div class="mb-3">
            <label for="name" class="form-label">Имя</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" required />
        </div>

        <!-- Фамилия -->
        <div class="mb-3">
            <label for="surname" class="form-label">Фамилия</label>
            <input type="text" id="surname" th:field="*{surname}" class="form-control" required />
        </div>

        <!-- Пароль -->
        <div class="mb-3">
            <label for="password" class="form-label">Пароль</label>
            <input type="password" id="password" th:field="*{password}" class="form-control" required minlength="6"/>
        </div>

        <!-- Подтверждение пароля -->
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Подтвердите пароль</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" required minlength="6"/>
        </div>

        <!-- Сообщение об ошибке -->
        <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
            Неверные данные.
        </div>

        <!-- Кнопка регистрации -->
        <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
        <a th:href="@{/login}" class="btn btn-secondary w-100 mt-3">На вход</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ZGJQH6C7+C7DkOJgpFrw20FdLcdvrU3HkakK0ZAdPWJ/wVG51731EbPY6beOOA4F"
        crossorigin="anonymous"></script>

</body>
</html>
