<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Регистрация</h2>

    <form th:action="@{/register}" method="post" th:object="${userDTO}" novalidate>

        <!-- Логин -->
        <div class="mb-3">
            <label for="username" class="form-label">Логин:</label>
            <input type="text" id="username" th:field="*{username}" class="form-control" required />
            <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></div>
        </div>

        <!-- Пароль -->
        <div class="mb-3">
            <label for="password" class="form-label">Пароль:</label>
            <input type="password" id="password" th:field="*{password}" class="form-control" required minlength="6"/>
        </div>

        <!-- Подтверждение пароля -->
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Подтвердите пароль:</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" required minlength="6"/>
        </div>

        <!-- Сообщение об ошибке -->
        <div th:if="${param.error}" class="alert alert-danger text-center">Неверный логин или пароль.</div>

        <!-- Кнопка регистрации -->
        <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
        <a th:href="@{/login}" class="btn btn-secondary w-100 mt-3">На вход</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
