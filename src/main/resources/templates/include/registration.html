<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>DoctorPlus — Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .auth-box {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 0 1rem rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<div class="auth-box">
    <h2 class="text-center mb-4">Регистрация</h2>

    <!-- Форма регистрации -->
    <form th:action="@{/register}" method="post" th:object="${userDTO}" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Логин -->
        <div class="mb-3">
            <label for="username">Логин</label>
            <input type="text" class="form-control" id="username" th:field="*{username}" required minlength="3" maxlength="20"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                 th:text="${#fields.firstError('username')}">Ошибка</div>
        </div>

        <!-- Имя -->
        <div class="mb-3">
            <label for="name">Имя</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                 th:text="${#fields.firstError('name')}">Ошибка</div>
        </div>

        <!-- Фамилия -->
        <div class="mb-3">
            <label for="surname">Фамилия</label>
            <input type="text" class="form-control" id="surname" th:field="*{surname}" required/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('surname')}"
                 th:text="${#fields.firstError('surname')}">Ошибка</div>
        </div>

        <!-- Пароль -->
        <div class="mb-3">
            <label for="password">Пароль</label>
            <input type="password" class="form-control" id="password" th:field="*{password}" required minlength="8" maxlength="20"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                 th:text="${#fields.firstError('password')}">Ошибка</div>
        </div>

        <!-- Подтверждение пароля -->
        <div class="mb-3">
            <label for="confirmPassword">Подтвердите пароль</label>
            <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" required minlength="8" maxlength="20"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                 th:text="${#fields.firstError('confirmPassword')}">Ошибка</div>
        </div>

        <!-- Сообщение об ошибке совпадения паролей -->
        <div th:if="${passwordMismatch}" class="alert alert-danger" role="alert">
            <span th:text="${passwordMismatch}"></span>
        </div>

        <!-- Кнопки -->
        <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
        <a th:href="@{/}" class="btn btn-secondary w-100 mt-3">← На главную</a>
    </form>
</div>

<!-- Валидация формы -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector(".needs-validation");
        if (form) {
            form.addEventListener("submit", function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add("was-validated");
            }, false);
        }
    });
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ZGJQH6C7+C7DkOJgpFrw20FdLcdvrU3HkakK0ZAdPWJ/wVG51731EbPY6beOOA4F"
        crossorigin="anonymous"></script>

</body>
</html>
