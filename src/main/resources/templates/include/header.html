<!-- header.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"/>

<!-- Навигационное меню -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">

        <!-- Логотип/название клиники -->
        <a class="navbar-brand" th:href="@{/}">DoctorPlus — Частная клиника</a>

        <!-- Кнопки "Главная" и "Профиль" -->
        <div class="d-flex align-items-center me-3">
            <a class="btn btn-outline-primary me-2" th:href="@{/}" role="button">Главная</a>
            <a class="btn btn-outline-success me-4" th:href="@{/profile}" role="button">Профиль</a>
        </div>

        <!-- Разделы сайта -->
        <ul class="navbar-nav flex-row flex-wrap">
            <li class="nav-item me-3">
                <a class="nav-link" th:href="@{/serving}" sec:authorize="isAuthenticated()">Услуги</a>
            </li>
            <li class="nav-item me-3">
                <a class="nav-link" th:href="@{/appointment}" sec:authorize="isAuthenticated()">Приёмы</a>
            </li>
            <li class="nav-item me-3" sec:authorize="hasAnyRole('DOCTOR', 'ADMIN')">
                <a class="nav-link" th:href="@{/patient}">Пациенты</a>
            </li>
            <li class="nav-item me-3" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/doctor}">Доктора</a>
            </li>
            <li class="nav-item me-3" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/user}">Пользователи</a>
            </li>
            <li class="nav-item me-3">
                <a class="nav-link" th:href="@{/about}">О системе</a>
            </li>
        </ul>

        <!-- Панель авторизации -->
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link" th:href="@{/login}">Вход</a>
            </li>
            <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link" th:href="@{/register}">Регистрация</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger ms-3">Выход</button>
                </form>
            </li>
        </ul>
    </div>
</nav>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

</body>
</html>
