<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>DoctorPlus — Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
        .auth-box {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 0 1rem rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<div class="auth-box">
    <h1 class="text-center mb-4">Вход</h1>
    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Логин -->
        <div class="mb-3">
            <label for="username" class="form-label">Логин:</label>
            <input type="text"
                   id="username"
                   name="username"
                   class="form-control"
                   required
                   autofocus/>
        </div>

        <!-- Пароль -->
        <div class="mb-3">
            <label for="password" class="form-label">Пароль:</label>
            <input type="password"
                   id="password"
                   name="password"
                   class="form-control"
                   required/>
        </div>

        <!-- Сообщение об ошибке -->
        <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
            Неверный логин или пароль.
        </div>

        <!-- Кнопка входа -->
        <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>

    <!-- Кнопки регистрации и главной страницы -->
    <div class="mt-3 text-center">
        <a th:href="@{/register}" class="btn btn-success w-100">Нет аккаунта? Зарегистрироваться</a>
        <a th:href="@{/}" class="btn btn-outline-secondary w-100 mt-2">На главную</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ZGJQH6C7+C7DkOJgpFrw20FdLcdvrU3HkakK0ZAdPWJ/wVG51731EbPY6beOOA4F"
        crossorigin="anonymous"></script>

</body>
</html>
