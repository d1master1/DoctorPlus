<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Профиль пациента</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"  rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<div th:replace="~{/include/header}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <!-- Левая колонка: имя и иконка -->
            <div class="col-md-4 mb-4 text-center">
                <!-- Иконка пользователя -->
                <i class="bi bi-person-circle text-dark" style="font-size: 12rem; height: 12; width: 12rem;"></i>

                <h5 class="mt-4" sec:authorize="isAuthenticated()">Ваше имя:</h5>
                <p class="fw-normal fs-5" th:text="${#authentication.name}" sec:authorize="isAuthenticated()"></p>
            </div>

            <!-- Правая колонка: история приёмов и данные профиля -->
            <div class="col-md-8" sec:authorize="isAuthenticated()">
                <!-- Приёмы -->
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Мои приёмы</h5>
                        <ul th:if="${appointments != null and !#lists.isEmpty(appointments)}"
                            class="list-group list-group-flush">
                            <li th:each="appointment : ${appointments}"
                                class="list-group-item">
                                <strong th:text="${appointment.serving.name}"></strong><br/>
                                <small>
                                    Дата: <span th:text="${appointment.getFormattedDate()}"></span><br/>
                                    Статус: <span th:text="${appointment.status}"></span><br/>
                                    Врач: <span th:text="${appointment.doctor.fullName}"></span>
                                </small>
                            </li>
                        </ul>
                        <div th:if="${appointments == null or #lists.isEmpty(appointments)}">
                            <p class="text-muted">Приёмы не найдены.</p>
                        </div>
                        <a href="/appointment" class="btn btn-outline-secondary btn-sm mt-2">
                            Перейти к списку приёмов
                        </a>
                    </div>
                </div>

                <!-- Услуги -->
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Заказанные услуги</h5>
                        <ul th:if="${servings != null and !#lists.isEmpty(servings)}"
                            class="list-group list-group-flush">
                            <li th:each="serving : ${servings}" class="list-group-item">
                                <strong th:text="${serving.name}"></strong><br/>
                                <small>
                                    Описание: <span th:text="${serving.description} ?: '-'"></span><br/>
                                    Стоимость: <span th:text="${serving.formattedCost} ?: '-'"></span>
                                </small>
                            </li>
                        </ul>
                        <div th:if="${servings == null or #lists.isEmpty(servings)}">
                            <p class="text-muted">Услуги не найдены.</p>
                        </div>
                        <a href="/serving" class="btn btn-outline-secondary btn-sm mt-2">
                            Подробнее об услугах
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Подвал -->
<div th:replace="~{/include/footer}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<!-- JS валидации формы -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector(".needs-validation");
        if (form) {
            form.addEventListener("submit", function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add("was-validated");
            }, false);
        }
    });
</script>

</body>
</html>
