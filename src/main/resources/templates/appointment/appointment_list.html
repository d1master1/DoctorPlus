<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>DoctorPlus — Приемы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .sidebar {
            width: 180px;
            background-color: #f8f9fa;
            border-right: 1px solid #ddd;
            height: 100vh;
            position: fixed;
            padding-top: 1rem;
        }

        .sidebar .nav-link {
            margin: 0.3rem 0;
        }

        .header {
            height: 56px;
            padding: 0 1rem;
            background-color: #e9ecef;
            border-bottom: 1px solid #ddd;
            margin-left: 180px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 500;
            font-size: 1rem;
        }

        .content {
            margin-left: 180px;
            margin-top: 56px;
            padding: 1rem;
        }

        .btn-edit {
            background-color: #fff176;
            border-color: #fff176;
            color: #000;
        }

        .btn-edit:hover {
            background-color: #f9f871;
            border-color: #f9f871;
        }

        .btn-delete {
            background-color: #f44336;
            border-color: #f44336;
            color: #fff;
        }

        .btn-delete:hover {
            background-color: #d32f2f;
            border-color: #d32f2f;
        }

        table thead th {
            text-align: center;
            vertical-align: middle;
        }

        table tbody td {
            vertical-align: middle;
        }

        .delete-confirmation {
            font-size: 0.9rem;
            color: #b71c1c;
            user-select: none;
        }
    </style>
</head>
<body>
<!-- Боковое меню -->
<div th:replace="~{/include/sidebar :: sidebar}"></div>

<header class="header">
    <div>DoctorPlus — Приемы</div>
    <div class="d-flex gap-2 align-items-center">
        <!-- Кнопки "Добавить" и "Удалить всех" -->
        <div sec:authorize="hasAnyRole('DOCTOR','ADMIN')" class="d-flex align-items-center gap-2">
            <a th:href="@{/appointment/add}" class="btn btn-primary">Добавить</a>
            <form th:action="@{/appointment/deleteAll}" method="post" style="display: inline;"
                  onsubmit="return confirm('Удалить все приемы?');">
                <button type="submit" class="btn btn-danger">Удалить все</button>
            </form>
        </div>

        <!-- Сортировка -->
        <div class="dropdown">
            <button class="btn btn-outline-info dropdown-toggle" type="button" id="sortDropdown"
                    data-bs-toggle="dropdown" aria-expanded="false">
                Сортировка
            </button>
            <ul class="dropdown-menu" aria-labelledby="sortDropdown">
                <li><a class="dropdown-item" th:href="@{/appointment(sortField='date', sortDir='asc')}"
                       th:classappend="${sortField == 'date' and sortDir == 'asc'} ? ' active' : ''">Дата ↑</a></li>
                <li><a class="dropdown-item" th:href="@{/appointment(sortField='date', sortDir='desc')}"
                       th:classappend="${sortField == 'date' and sortDir == 'desc'} ? ' active' : ''">Дата ↓</a></li>
                <li><hr class="dropdown-divider"/></li>
                <li><a class="dropdown-item" th:href="@{/appointment}"
                       th:classappend="${sortField == null} ? ' active' : ''">Без сортировки</a></li>
            </ul>
        </div>
    </div>
</header>

<main class="content">
    <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
        Невозможно удалить прием — он связан с данными.
    </div>
    <div th:if="${param.partialError}" class="alert alert-warning text-center" role="alert">
        Удалены только неиспользуемые записи.
    </div>

    <table class="table table-bordered table-hover table-striped align-middle text-center">
        <thead class="table-light">
        <tr>
            <th>Дата</th>
            <th>Статус</th>
            <th>Пациент</th>
            <th>Доктор</th>
            <th>Услуга</th>
            <th sec:authorize="hasAnyRole('DOCTOR','ADMIN')">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="appointment : ${appointments}">
            <td th:text="${appointment.getFormattedDate()}"></td>
            <td th:text="${appointment.status}"></td>
            <td th:text="${appointment.patient.fullName}"></td>
            <td th:text="${appointment.doctor.fullName}"></td>
            <td th:text="${appointment.serving.name}"></td>
            <td sec:authorize="hasAnyRole('DOCTOR','ADMIN')">
                <a th:href="@{/appointment/edit/{id}(id=${appointment.id})}" class="btn btn-sm btn-edit me-1">Изменить</a>
                <form th:id="'deleteForm_' + ${appointment.id}"
                      th:action="@{/appointment/delete/{id}(id=${appointment.id})"
                      method="post" style="display: inline-block;"
                      onsubmit="return confirm('Удалить прием?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-delete btn-sm">Удалить</button>
                </form>
                <div th:id="'deleteConfirm_' + ${appointment.id}" class="delete-confirmation" style="display:none; margin-top: 0.3rem;">
                    <span>Удалить прием?</span>
                    <button type="button" class="btn btn-sm btn-danger ms-2" th:attr="onclick=|submitDeleteForm(${appointment.id})|">Подтвердить</button>
                    <button type="button" class="btn btn-sm btn-secondary ms-1" th:attr="onclick=|hideDeleteConfirm(${appointment.id})|">Отмена</button>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(appointments)}">
            <td colspan="6" class="text-center text-muted">Приемы отсутствуют</td>
        </tr>
        </tbody>
    </table>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    function submitDeleteForm(id) {
        document.getElementById('deleteForm_' + id).submit();
    }

    function hideDeleteConfirm(id) {
        document.getElementById('deleteConfirm_' + id).style.display = 'none';
    }
</script>
</body>
</html>
