<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>DoctorPlus — Форма для приема</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{/include/header}"></div>

<main class="flex-grow-1">
    <div class="container mt-5">
        <h1 th:text="${appointment.id == null} ? 'Добавить прием' : 'Редактировать прием'"></h1>
        <form th:action="@{/appointment/save}" th:object="${appointment}" method="post" novalidate>
            <input type="hidden" th:field="*{id}"/>

            <!-- Дата -->
            <div class="mb-3">
                <label for="date" class="form-label">Дата и время</label>
                <input type="datetime-local" id="date" class="form-control" th:field="*{date}" required/>
            </div>

            <!-- Статус -->
            <div class="mb-3">
                <label for="statusField" class="form-label">Статус</label>
                <select th:field="*{status}" id="statusField" class="form-select" required>
                    <option value="" disabled th:selected="${appointment.status == null}">Выберите статус</option>
                    <option value="Запланирован" th:selected="${appointment.status == 'Запланирован'}">Запланирован</option>
                    <option value="Выполнен" th:selected="${appointment.status == 'Выполнен'}">Выполнен</option>
                    <option value="Отменен" th:selected="${appointment.status == 'Отменен'}">Отменен</option>
                </select>
                <div class="invalid-feedback">Выберите статус приема.</div>
            </div>

            <!-- Пациент -->
            <div class="mb-3">
                <label for="patientSelect" class="form-label">Пациент</label>
                <select th:field="*{patient.id}" id="patientSelect" class="form-select" onchange="updatePatientFields()" required>
                    <option value="">-- Выберите пациента --</option>
                    <option th:each="patient : ${patients}"
                            th:value="${patient.id}"
                            th:text="${patient.fullName}"
                            th:selected="${patient.id == appointment.patient?.id}">
                    </option>
                </select>
            </div>

            <!-- Доктор -->
            <div class="mb-3">
                <label for="doctorSelect" class="form-label">Доктор</label>
                <select th:field="*{doctor.id}" id="doctorSelect" class="form-select" onchange="updateDoctorFields()" required>
                    <option value="">-- Выберите доктора --</option>
                    <option th:each="doctor : ${doctors}"
                            th:value="${doctor.id}"
                            th:text="${doctor.fullName}"
                            th:selected="${doctor.id == appointment.doctor?.id}">
                    </option>
                </select>
            </div>

            <!-- Услуга -->
            <div class="mb-3">
                <label for="servingSelect" class="form-label">Услуга</label>
                <select th:field="*{serving.id}" id="servingSelect" class="form-select" onchange="updateServingFields()" required>
                    <option value="">-- Выберите услугу --</option>
                    <option th:each="serving : ${servings}"
                            th:value="${serving.id}"
                            th:text="${serving.name}"
                            th:selected="${serving.id == appointment.serving?.id}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="@{/appointment}" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</main>

<!-- JSON данные для JS -->
<div id="patientJson" th:attr="data-json=${patientJson}" hidden></div>
<div id="doctorJson" th:attr="data-json=${doctorJson}" hidden></div>
<div id="servingJson" th:attr="data-json=${servingJson}" hidden></div>

<script>
    function updatePatientFields() {
        const patientElement = document.getElementById("patientJson");
        const data = patientElement ? patientElement.dataset.json : "[]";
        const patientData = JSON.parse(data || "[]");
        const selectedId = document.getElementById("patientSelect").value;
        const patient = patientData.find(p => p.id == selectedId);

        // Пример обновления данных (можно расширить)
        if (patient) {
            console.log("Выбран пациент:", patient);
        }
    }

    function updateDoctorFields() {
        const doctorElement = document.getElementById("doctorJson");
        const data = doctorElement ? doctorElement.dataset.json : "[]";
        const doctorData = JSON.parse(data || "[]");
        const selectedId = document.getElementById("doctorSelect").value;
        const doctor = doctorData.find(d => d.id == selectedId);

        if (doctor) {
            console.log("Выбран доктор:", doctor);
        }
    }

    function updateServingFields() {
        const servingElement = document.getElementById("servingJson");
        const data = servingElement ? servingElement.dataset.json : "[]";
        const servingData = JSON.parse(data || "[]");
        const selectedId = document.getElementById("servingSelect").value;
        const serving = servingData.find(s => s.id == selectedId);

        if (serving) {
            console.log("Выбрана услуга:", serving);
        }
    }
</script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
</body>
</html>
