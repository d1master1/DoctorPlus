<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Пациенты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"  rel="stylesheet"/>
</head>
<body>

<th:block th:set="${activePage}" th:text="'patients'" />

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">DoctorPlus</a>
    </div>
</nav>

<div class="container mt-5">
    <h2>Список пациентов</h2>
    <a href="/patients/create" class="btn btn-success mb-3">Добавить пациента</a>

    <!-- Форма поиска -->
    <form th:action="@{/patients}" method="get" class="mb-3">
        <input type="text" name="search" placeholder="Поиск по имени..." class="form-control w-50 d-inline-block me-2" />
        <button type="submit" class="btn btn-outline-primary">Найти</button>
    </form>

    <!-- Таблица с сортировкой -->
    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th><a th:href="@{/patients(sort='id')}">ID</a></th>
            <th><a th:href="@{/patients(sort='name')}">Имя</a></th>
            <th><a th:href="@{/patients(sort='email')}">Email</a></th>
            <th><a th:href="@{/patients(sort='phone')}">Телефон</a></th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="patient : ${patients}">
            <td th:text="${patient.id}"></td>
            <td th:text="${patient.name}"></td>
            <td th:text="${patient.email}"></td>
            <td th:text="${patient.phone}"></td>
            <td>
                <a th:href="@{'/patients/edit/' + ${patient.id}}" class="btn btn-sm btn-warning">Изменить</a>
                <a th:href="@{'/patients/delete/' + ${patient.id}}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
