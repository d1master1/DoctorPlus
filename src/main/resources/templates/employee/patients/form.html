<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${patient.id} ? 'Редактировать' : 'Создать' + ' пациента'">Создать пациента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"  rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">DoctorPlus</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 th:text="${patient.id} ? 'Редактировать пациента' : 'Создать нового пациента'">Создать пациента</h2>

    <form th:action="@{/patients/edit}" th:object="${patient}" method="post">
        <!-- Скрытое поле ID -->
        <input type="hidden" th:field="*{id}" />

        <!-- Имя -->
        <div class="mb-3">
            <label for="name" class="form-label">Имя</label>
            <input type="text" id="name" th:field="*{name}" class="form-control" />
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
        </div>

        <!-- Телефон -->
        <div class="mb-3">
            <label for="phone" class="form-label">Телефон</label>
            <input type="text" id="phone" th:field="*{phone}" class="form-control" />
            <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-danger"></span>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" th:field="*{email}" class="form-control" />
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
        </div>

        <!-- Кнопка отправки -->
        <button type="submit" class="btn btn-primary"
                th:text="${patient.id} ? 'Обновить запись' : 'Сохранить'">Сохранить</button>

        <a href="/patients" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
