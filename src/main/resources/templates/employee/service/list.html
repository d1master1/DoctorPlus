<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Услуги</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"  rel="stylesheet"/>
</head>
<body>

<th:block th:set="${activePage}" th:text="'services'" />

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">DoctorPlus</a>
    </div>
</nav>

<div class="container mt-5">
    <h2>Список услуг</h2>
    <a href="/services/create" class="btn btn-success mb-3">Добавить услугу</a>

    <!-- Форма поиска -->
    <form th:action="@{/services}" method="get" class="mb-3">
        <input type="text" name="search" placeholder="Поиск по названию..." class="form-control w-50 d-inline-block me-2" />
        <button type="submit" class="btn btn-outline-primary">Найти</button>
    </form>

    <!-- Таблица с сортировкой -->
    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th><a th:href="@{/services(sort='id')}">ID</a></th>
            <th><a th:href="@{/services(sort='name')}">Название</a></th>
            <th><a th:href="@{/services(sort='price')}">Цена</a></th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="service : ${services}">
            <td th:text="${service.id}"></td>
            <td th:text="${service.name}"></td>
            <td th:text="${service.price} + ' ₽'"></td>
            <td>
                <a th:href="@{'/services/edit/' + ${service.id}}" class="btn btn-sm btn-warning">Изменить</a>
                <a th:href="@{'/services/delete/' + ${service.id}}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
