<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Профиль | DoctorPlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"  rel="stylesheet" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">

<div class="card shadow-sm p-4 mt-5" style="width: 400px;">
    <h4 class="text-center mb-4">Ваш профиль</h4>

    <p class="text-center">Имя пользователя: <strong th:text="${user.username}"></strong></p>
    <p class="text-center">Роль: <strong th:text="${user.role.name()}"></strong></p>

    <div class="text-center mt-3">
        <a th:href="@{/logout}" class="btn btn-outline-danger">Выйти</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
