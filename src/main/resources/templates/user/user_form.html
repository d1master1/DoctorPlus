<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Редактировать пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Редактировать пользователя</h2>

    <form th:action="@{/user/update}" method="post" th:object="${userDTO}">
        <input type="hidden" th:field="*{id}" />

        <!-- Логин -->
        <div class="mb-3">
            <label>Логин:</label>
            <input type="text" th:field="*{username}" class="form-control" disabled />
        </div>

        <!-- Роли -->
        <div class="mb-3 form-check">
            <label>Роли:</label><br/>
            <div th:each="role : ${T(org.example.doctorplus.model.Role).values()}">
                <input type="checkbox"
                       th:field="*{roles}"
                       th:value="${role.name()}"
                       class="form-check-input"/>
                <label class="form-check-label" th:text="${role}">Role</label><br/>
            </div>
        </div>

        <!-- Пароль -->
        <div class="mb-3">
            <label>Пароль:</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Оставьте пустым, если не хотите менять" />
        </div>

        <!-- Подтверждение пароля -->
        <div class="mb-3">
            <label>Подтвердите пароль:</label>
            <input type="password" th:field="*{confirmPassword}" class="form-control" />
        </div>

        <!-- Кнопки -->
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a th:href="@{/user}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
