<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>DoctorPlus — Список пользователей</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>

    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .sidebar {
            width: 180px;
            background-color: #f8f9fa;
            border-right: 1px solid #ddd;
            height: 100vh;
            position: fixed;
            padding-top: 1rem;
        }

        .header {
            height: 56px;
            padding: 0 1rem;
            background-color: #e9ecef;
            border-bottom: 1px solid #ddd;
            margin-left: 180px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1rem;
        }

        .content {
            margin-left: 180px;
            margin-top: 56px;
            padding: 1rem;
        }

        .btn-edit {
            background-color: #fff176;
            color: #000;
            border-color: #fff176;
        }

        .btn-edit:hover {
            background-color: #f9f871;
            border-color: #f9f871;
        }
    </style>
</head>
<body class="bg-light">

<!-- Боковое меню -->
<div th:replace="~{/include/sidebar :: sidebar}"></div>

<header class="header d-flex align-items-center justify-content-between">
    <div>DoctorPlus — Пользователи</div>

    <!-- Сортировка -->
    <div class="dropdown">
        <button class="btn btn-outline-info dropdown-toggle" type="button" id="sortDropdown"
                data-bs-toggle="dropdown" aria-expanded="false">
            Сортировка
        </button>
        <ul class="dropdown-menu" aria-labelledby="sortDropdown">
            <li><a class="dropdown-item" th:href="@{/user(sort='username_asc')}"
                   th:classappend="${sort == 'username_asc'} ? ' active' : ''">Логин ↑</a></li>
            <li><a class="dropdown-item" th:href="@{/user(sort='username_desc')}"
                   th:classappend="${sort == 'username_desc'} ? ' active' : ''">Логин ↓</a></li>
            <li><a class="dropdown-item" th:href="@{/user(sort='name_asc')}"
                   th:classappend="${sort == 'name_asc'} ? ' active' : ''">Имя ↑</a></li>
            <li><a class="dropdown-item" th:href="@{/user(sort='name_desc')}"
                   th:classappend="${sort == 'name_desc'} ? ' active' : ''">Имя ↓</a></li>
            <li><hr class="dropdown-divider"/></li>
            <li><a class="dropdown-item" th:href="@{/user}" th:classappend="${sort == null or sort == ''} ? ' active' : ''">Без сортировки</a></li>
        </ul>
    </div>
</header>

<main class="content">
    <div class="container mt-3">

        <!-- Сообщение об ошибке -->
        <div th:if="${ErrorMessage}" class="alert alert-warning alert-dismissible fade show" role="alert">
            <span th:text="${ErrorMessage}">Ошибка</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Таблица пользователей -->
        <table class="table table-bordered table-hover table-striped align-middle text-center">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Логин</th>
                <th>Имя</th>
                <th>Фамилия</th>
                <th>Роли</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">ID</td>
                <td th:text="${user.username}">Логин</td>
                <td th:text="${user.name}">Имя</td>
                <td th:text="${user.surname}">Фамилия</td>
                <td>
                    <span th:each="role : ${user.roles}"
                          class="badge bg-secondary me-1"
                          th:text="${role.displayName}">
                        USER
                    </span>
                </td>
                <td class="text-center">
                    <a th:href="@{/user/edit/{id}(id=${user.id})}" class="btn btn-sm btn-edit">Редактировать роли</a>
                </td>
            </tr>

            <!-- Если нет пользователей -->
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="6" class="text-muted text-center">Пользователи отсутствуют</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap @5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

</body>
</html>
