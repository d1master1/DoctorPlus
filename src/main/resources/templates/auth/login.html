<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Вход | DoctorPlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"  rel="stylesheet" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">

<div class="card shadow-sm p-4 mt-5" style="width: 400px;">
    <h4 class="text-center mb-4">Войдите в систему</h4>

    <!-- Сообщение об ошибке -->
    <div th:if="${param.error}" class="alert alert-danger text-center">
        Неверный логин или пароль
    </div>

    <form th:action="@{/login}" th:object="${loginData}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" th:field="*{username}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" th:field="*{password}" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>

    <div class="mt-3 text-center">
        <a th:href="@{/register}" class="text-decoration-none">Нет аккаунта? Зарегистрируйтесь</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
