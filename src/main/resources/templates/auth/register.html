<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Регистрация | DoctorPlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"  rel="stylesheet" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">

<div class="card shadow-sm p-4 mt-5" style="width: 400px;">
    <h4 class="text-center mb-4">Регистрация</h4>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" th:field="*{username}" class="form-control" required />
            <span th:if="${#fields.hasErrors('username')}" th:each="err : ${#fields.errors('username')}"
                  class="text-danger" th:text="${err}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" th:field="*{password}" class="form-control" required />
            <span th:if="${#fields.hasErrors('password')}" th:each="err : ${#fields.errors('password')}"
                  class="text-danger" th:text="${err}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Подтверждение пароля</label>
            <input type="password" th:field="*{confirmPassword}" class="form-control" required />
            <span th:if="${#fields.hasErrors('confirmPassword')}" th:each="err : ${#fields.errors('confirmPassword')}"
                  class="text-danger" th:text="${err}"></span>
        </div>

        <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
    </form>

    <div class="mt-3 text-center">
        <a th:href="@{/login}" class="text-decoration-none">Уже зарегистрированы?</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
