<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>DoctorPlus — Форма для доктора</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>

    <style>
        body {
            padding-top: 56px; /* отступ под header */
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<!-- Шапка -->
<div th:replace="~{/include/header}"></div>

<main class="flex-grow-1 py-4">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <!-- Заголовок формы -->
                <h2 class="text-center mb-4"
                    th:text="${doctor.id == null ? 'Добавить доктора' : 'Редактировать доктора'}">
                    Форма доктора
                </h2>

                <!-- Сообщения об ошибках валидации -->
                <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                    Пожалуйста, исправьте ошибки ниже.
                </div>

                <!-- Сообщения об ошибках из контроллера -->
                <th:block th:if="${validationErrors != null}">
                    <ul class="list-group list-group-flush mb-3">
                        <li th:each="error : ${validationErrors}"
                            class="list-group-item text-danger">
                            <span th:text="${error}">Ошибка валидации</span>
                        </li>
                    </ul>
                </th:block>

                <!-- Форма доктора -->
                <form th:action="@{/doctor/save}" method="post" th:object="${doctorDTO}">

                    <!-- Выбор пользователя -->
                    <div class="mb-3">
                        <label>Пользователь:</label>
                        <select th:field="*{user}" class="form-select" required>
                            <option value="">Выберите пользователя</option>
                            <option th:each="user : ${users}"
                                    th:value="${user.username}"
                                    th:text="${user.username}">user</option>
                        </select>
                    </div>

                    <!-- Имя -->
                    <div class="mb-3">
                        <label for="name" class="form-label">Имя:</label>
                        <input type="text"
                               id="name"
                               th:field="*{name}"
                               class="form-control"
                               required />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                             th:text="${#fields.firstError('name')}">
                            Введите имя
                        </div>
                    </div>

                    <!-- Фамилия -->
                    <div class="mb-3">
                        <label for="surname" class="form-label">Фамилия:</label>
                        <input type="text"
                               id="surname"
                               th:field="*{surname}"
                               class="form-control"
                               required />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('surname')}"
                             th:text="${#fields.firstError('surname')}">
                            Введите фамилию
                        </div>
                    </div>

                    <!-- Отчество -->
                    <div class="mb-3">
                        <label for="patronymic" class="form-label">Отчество (необязательно):</label>
                        <input type="text"
                               id="patronymic"
                               th:field="*{patronymic}"
                               class="form-control" />
                    </div>

                    <!-- Специальность -->
                    <div class="mb-3">
                        <label for="speciality" class="form-label">Специальность:</label>
                        <input type="text"
                               id="speciality"
                               th:field="*{speciality}"
                               class="form-control"
                               required />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('speciality')}"
                             th:text="${#fields.firstError('speciality')}">
                            Укажите специальность
                        </div>
                    </div>

                    <!-- Расписание -->
                    <div class="mb-3">
                        <label for="schedule" class="form-label">Расписание:</label>
                        <input type="text"
                               id="schedule"
                               th:field="*{schedule}"
                               class="form-control"
                               required />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('schedule')}"
                             th:text="${#fields.firstError('schedule')}">
                            Укажите расписание
                        </div>
                    </div>

                    <!-- Телефон -->
                    <div class="mb-3">
                        <label for="phone" class="form-label">Телефон (необязательно):</label>
                        <input type="tel"
                               id="phone"
                               th:field="*{phone}"
                               class="form-control" />
                    </div>

                    <!-- Кнопки -->
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a th:href="@{/doctor}" class="btn btn-secondary ms-2">Назад к списку</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<!-- JS валидации и автозаполнения -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const userSelect = document.getElementById('userSelect');
        const nameField = document.getElementById('name');
        const surnameField = document.getElementById('surname');

        if (userSelect) {
            // Автозаполнение при загрузке
            const selectedOption = userSelect.options[userSelect.selectedIndex];
            if (selectedOption && selectedOption.dataset) {
                nameField.value = selectedOption.dataset.name || '';
                surnameField.value = selectedOption.dataset.surname || '';
            }

            // Обновление полей при смене пользователя
            userSelect.addEventListener('change', function () {
                const selectedOption = this.options[this.selectedIndex];

                if (selectedOption && selectedOption.dataset) {
                    nameField.value = selectedOption.dataset.name || '';
                    surnameField.value = selectedOption.dataset.surname || '';
                } else {
                    nameField.value = '';
                    surnameField.value = '';
                }
            });
        }
    });
</script>

</body>
</html>
