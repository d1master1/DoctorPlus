<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>DoctorPlus — Форма для доктора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{/include/header}"></div>

<main class="flex-grow-1">
    <div class="container mt-5">
        <h1 th:text="${doctor.id == null ? 'Добавить доктора' : 'Редактировать доктора'}">Форма доктора</h1>
        <form th:action="@{/doctor/save}" th:object="${doctor}" method="post" novalidate>
            <input type="hidden" th:field="*{id}"/>

            <!-- Выбор пользователя -->
            <div class="mb-4">
                <label for="userSelect" class="form-label">Выберите пользователя:</label>
                <select class="form-select" id="userSelect" th:field="*{user.id}">
                    <option value="">— Не выбрано —</option>
                    <option th:each="user : ${users}"
                            th:value="${user.id}"
                            th:selected="${doctor.user != null and user.id == doctor.user.id}"
                            th:data-name="${user.name}"
                            th:data-surname="${user.surname}"
                            th:text="|${user.username} (${user.name} ${user.surname})|">
                    </option>
                </select>
            </div>

            <!-- Имя -->
            <div class="mb-3">
                <label for="name" class="form-label">Имя:</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" required/>
                <div class="invalid-feedback">Введите имя.</div>
            </div>

            <!-- Фамилия -->
            <div class="mb-3">
                <label for="surname" class="form-label">Фамилия:</label>
                <input type="text" class="form-control" id="surname" th:field="*{surname}" required/>
                <div class="invalid-feedback">Введите фамилию.</div>
            </div>

            <!-- Отчество -->
            <div class="mb-3">
                <label for="patronymic" class="form-label">Отчество (необязательно):</label>
                <input type="text" class="form-control" id="patronymic" th:field="*{patronymic}"/>
            </div>

            <!-- Специальность -->
            <div class="mb-3">
                <label for="speciality" class="form-label">Специальность:</label>
                <input type="text" class="form-control" id="speciality" th:field="*{speciality}" required/>
                <div class="invalid-feedback">Укажите специальность.</div>
            </div>

            <!-- Расписание -->
            <div class="mb-3">
                <label for="schedule" class="form-label">Расписание:</label>
                <input type="text" class="form-control" id="schedule" th:field="*{schedule}" required/>
                <div class="invalid-feedback">Укажите расписание.</div>
            </div>

            <!-- Телефон -->
            <div class="mb-3">
                <label for="phone" class="form-label">Телефон:</label>
                <input type="text" class="form-control" id="phone" th:field="*{phone}"/>
            </div>

            <!-- Кнопки -->
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="@{/doctor}" class="btn btn-secondary">Назад к списку</a>
        </form>

        <!-- Блок ошибок валидации -->
        <th:block th:if="${validationErrors != null and #lists.isNotEmpty(validationErrors)}">
            <ul class="alert alert-danger mt-3">
                <li th:each="error : ${validationErrors}" th:text="${error}"></li>
            </ul>
        </th:block>
    </div>
</main>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const userSelect = document.getElementById('userSelect');
        const nameField = document.getElementById('name');
        const surnameField = document.getElementById('surname');
        const patronymicField = document.getElementById('patronymic');

        if (userSelect) {
            // Установка начальных значений при загрузке страницы
            const selectedOption = userSelect.options[userSelect.selectedIndex];
            if (selectedOption) {
                nameField.value = selectedOption.dataset.name || '';
                surnameField.value = selectedOption.dataset.surname || '';
            }

            // Обновление имени и фамилии при смене пользователя
            userSelect.addEventListener('change', function () {
                const selectedOption = this.options[this.selectedIndex];
                if (selectedOption) {
                    nameField.value = selectedOption.dataset.name || '';
                    surnameField.value = selectedOption.dataset.surname || '';
                } else {
                    nameField.value = '';
                    surnameField.value = '';
                }
            });
        }
    });
</script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"  rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
</body>
</html>
